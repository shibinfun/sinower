      hero_title: "关于 SINOWER"
      hero_desc: "SINOWER USA 成立于 2025 年，标志着我们向北美市场全球扩张的新阶段。我们在佐治亚州 (GA) 的设施是我们首个官方美国分公司和分销中心，奠定了我们长期国家发展战略的基础。"
      heritage_title: "超过 20 年的制造专业知识"
      heritage_desc_1: "虽然在美国是新品牌，但 Sinower 拥有超过 20 年的制造专业知识和国际市场经验。我们的制造集团在欧洲和中东地区成功运营，在法国、德国、捷克、意大利、英国和迪拜（阿联酋）设有分公司。"
      heritage_desc_2: "在过去的二十年里，我们建立了强大的运营体系、先进的生产能力和严格的质量控制标准，为全球经销商和 OEM 合作伙伴提供服务。"
      stats:
        years: "年制造经验"
        subsidiaries: "全球分公司"
      product_lines_title: "核心产品线"
