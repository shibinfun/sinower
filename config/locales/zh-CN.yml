        refrigeration: "商用制冷设备"
        cooking: "商用烹饪设备"
        stainless: "不锈钢餐饮用品"
      value_title: "制造实力与竞争价值"
      value_desc_1: "凭借纵向一体化的生产和高效的成本管理，Sinower 在保持更高制造标准和产品可靠性的同时，提供具有竞争力的工厂直供价格。"
      value_desc_2: "我们的佐治亚州仓库保持充足库存，确保美国市场的快速交付和稳定供应。此外，基于工厂的工程和技术团队提供专业支持和可靠保修，增强合作伙伴信心。"
      expansion_title: "美国战略扩张计划"
      expansion_desc: "SINOWER USA 致力于建立强大的全国覆盖。在未来三年内，我们计划在美国东西海岸共建立 9 个分公司及分销中心。"
      expansion_stats:
        offices: "分公司及分销中心"
        plan: "三年战略扩张计划"
        efficiency: "东西海岸物流效率"
      expansion_footer: "这一扩张将提高物流效率，缩短响应时间，并在我们与合作伙伴共同成长的过程中提供本地化服务支持。"
      commitment_title: "我们的承诺"
      commitment_desc: "作为美国市场快速增长的品牌，Sinower 为早期合作伙伴提供了在结构化、稳定的分销模式中共同成长的机会。我们相信长期的成功建立在诚信、透明和互利的基础之上。"
      become_dealer_title: "成为 SINOWER 经销商"
      become_dealer_desc: "与定位扩张的品牌共同成长。我们不仅供应设备，更致力于建立由制造实力和全球经验驱动的可持续合作伙伴关系。"
